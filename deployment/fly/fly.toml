app = "replace-with-your-app"
primary_region = "ams"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  PASEO_RELAY_HOST = "0.0.0.0"
  PASEO_RELAY_PORT = "4000"
  PASEO_RELAY_MIN_CLUSTER_SIZE = "2"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2

  [http_service.concurrency]
    type = "connections"
    soft_limit = 40000
    hard_limit = 60000

  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "15s"
    method = "GET"
    path = "/ready"

[deploy]
  strategy = "rolling"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
